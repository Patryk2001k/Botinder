version: '3.8'

services:
  # 1. Baza danych PostgreSQL z PostGIS
  db:
    image: postgis/postgis:15-3.4
    container_name: botinder_db
    environment:
      POSTGRES_USER: botinder_user
      POSTGRES_PASSWORD: botinder_secure_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botinder_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis
  redis:
    image: redis:7-alpine
    container_name: botinder_redis
    ports:
      - "6379:6379"

  # 3. Główna aplikacja Flask (Botinder)
  botinder-web:
    build:
      context: .  # Budowanie z katalogu głównego
    container_name: botinder_web
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://botinder_user:botinder_secure_password@db:5432/botinder
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # 4. Konsument zadań w tle (Huey worker dla Flaska)
  huey-worker:
    build:
      context: .  # Budowanie z katalogu głównego
    container_name: botinder_huey_worker
    command: python -m huey.bin.huey_consumer app.extensions.huey
    environment:
      - DATABASE_URL=postgresql://botinder_user:botinder_secure_password@db:5432/botinder
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data: